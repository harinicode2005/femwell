<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FemWell | Forgot Password</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/signin.css') }}?v=20260316-1">
</head>
<body>
    <div class="signin-container">
        <div class="signin-card">
            <h1 class="logo">FemWell</h1>
            <h2>Forgot Password</h2>
            <p class="subtitle">Reset your password using OTP</p>

            {% if error %}
            <p style="color:red; text-align:center; margin-bottom:10px;">{{ error }}</p>
            {% endif %}
            {% if success %}
            <p style="color:green; text-align:center; margin-bottom:10px;">{{ success }}</p>
            {% endif %}

            <form action="/forgot-password/send-otp" method="POST">
                <label>Email</label>
                <input type="email" name="email" value="{{ email }}" placeholder="Enter your registered email" required>
                <button type="submit" class="signin-btn">Send OTP</button>
            </form>

            <form action="/forgot-password/reset" method="POST" style="margin-top:16px;">
                <label>Email</label>
                <input type="email" name="email" value="{{ email }}" placeholder="Enter your registered email" required>

                <label>OTP</label>
                <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>

                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password" required>

                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password" required>

                <button type="submit" class="signin-btn">Reset Password</button>
            </form>

            <p class="bottom-text">
                Back to
                <a href="/signin">Sign In</a>
            </p>
        </div>
    </div>
</body>
</html>
